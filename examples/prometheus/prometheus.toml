# prometheus.toml
seed = 1337
device = "auto"
multi_gpu = false

[model]
name = "prometheus"
pretrained_path = ""  # optional: path to a saved .pth checkpoint

[data]
name = "prometheus"
path = "data/prometheus"  # directory containing operational CSV files

[train]
batch_size = 1
num_workers = 1
init_lr = 0.001
max_iter = 600
grad_accumulation_steps = 2

[continual_learning]
update_mode = "base"
jvp_lambda = 10
jvp_deltax_norm = 1

# EWC hyperparameters
ewc_lambda = 1000.0
ewc_ema_decay = 0.95

# K-FAC hyperparameters
kfac_lambda = 1e-2
kfac_ema_decay = 0.95

[drift_detection]
detector_name = "ADWINDetector"
detection_interval = 10   # check drift every 10 batches
aggregation = "mean"
metric_index = 0          # monitor MSE loss (index 0)
reset_after_learning = false
max_stream_updates = 10   # stop after 10 data-stream updates (matches NUM_TASKS)

# ADWIN hyperparameters
adwin_delta = 0.002
adwin_minor_threshold = 0.3
adwin_moderate_threshold = 0.6

[logging]
backend = "mlflow"
experiment_name = "prometheus-continual-learning"

[visualization]
baseline = 0.01           # target MSE threshold for the dashboard
input = "output/prometheus.csv"
output = "output/prometheus_dashboard.png"
