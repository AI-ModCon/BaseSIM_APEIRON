# slac-fel.toml  —  LCLS FEL continuous-learning experiment
seed = 42
device = "auto"
multi_gpu = false
verbosity = "INFO"

[model]
name = "fel"
# Set to "" to train from scratch, or point to a saved state_dict .pt file
pretrained_path = "examples/slac_fel/model/final_lcls_fel_model.pt"
# Directory containing: input_scaler.pt, output_scaler.pt, feature_config.yml
config_path = "examples/slac_fel/model"

[data]
name = "slac-fel"
path = "examples/slac_fel/data"
# Number of samples per time window (smaller = more windows = finer drift granularity)
# window_size = 500

[train]
batch_size = 512
num_workers = 0
init_lr = 1e-5
max_iter = 600
grad_accumulation_steps = 1

[continual_learning] # copied from MNIST TOML
update_mode = "base"

# JVP regularization (used when update_mode = "jvp_reg")
jvp_lambda = 10
jvp_deltax_norm = 1

# EWC (used when update_mode = "ewc_online")
ewc_lambda = 1000.0
ewc_ema_decay = 0.95

# KFAC (used when update_mode = "kfac_online")
kfac_lambda = 1e-2
kfac_ema_decay = 0.95

[drift_detection]
detector_name = "ADWINDetector"
# Check for drift every N batches.  With batch_size=512 and ~5000 samples
# per window (20% val → ~1000 val samples → 2 val batches), interval=6
# averages MSE over ~3 windows (~3072 samples), giving stable estimates
# while remaining responsive to real operating-point changes.
detection_interval = 1
aggregation = "mean"
reset_after_learning = true
max_stream_updates = 1181

# ADWIN hyperparameters
# delta = confidence parameter.  Lower = more conservative (fewer detections).
#   0.002 = 99.8% confidence
#   0.05  = 95% confidence
adwin_delta = 0.05
# Regime thresholds on recent drift frequency (0–1 scale):
#   <minor  → CONTINUAL_LEARNING  (lightweight update)
#   <moderate → FINE_TUNING        (larger update)
#   ≥moderate → RETRAIN            (full retrain)
adwin_minor_threshold = 0.1
adwin_moderate_threshold = 0.4

[logging]
backend = "mlflow"
experiment_name = "slac-fel-continual-learning"
mlflow_tracking_uri = "https://ard-mlflow.slac.stanford.edu/"

[visualization]
baseline = 0.01        # MSE baseline threshold, need to determine
input = "output/slac-fel.csv"
output = "output/slac-fel_dashboard.png"

