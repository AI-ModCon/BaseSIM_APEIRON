# slac-fel.toml  —  LCLS FEL continuous-learning experiment
seed = 42
device = "auto"
multi_gpu = false
verbosity = "INFO"

[model]
name = "fel"
# Set to "" to train from scratch, or point to a saved state_dict .pt file
pretrained_path = ""

[data]
name = "slac-fel"
# Directory containing: data.pkl, input_scaler.pt, output_scaler.pt, feature_config.yml
path = "examples/slac_fel/data"

[train]
batch_size = 512
num_workers = 4
init_lr = 1e-5
max_iter = 600
grad_accumulation_steps = 1

[continual_learning] # copied from MNIST TOML
update_mode = "base"

# JVP regularization (used when update_mode = "jvp_reg")
jvp_lambda = 10
jvp_deltax_norm = 1

# EWC (used when update_mode = "ewc_online")
ewc_lambda = 1000.0
ewc_ema_decay = 0.95

# KFAC (used when update_mode = "kfac_online")
kfac_lambda = 1e-2
kfac_ema_decay = 0.95

[drift_detection] # copied from MNIST TOML
detector_name = "ADWINDetector"
detection_interval = 10
aggregation = "mean"
metric_index = 0
reset_after_learning = false
max_stream_updates = 20

# ADWIN hyperparameters
adwin_delta = 0.002
adwin_minor_threshold = 0.3
adwin_moderate_threshold = 0.6

[logging]
backend = "wandb"
experiment_name = "slac-fel-continual-learning"

[visualization]
baseline = 0.01        # MSE baseline threshold, need to determine
input = "output/slac-fel.csv"
output = "output/slac-fel_dashboard.png"

