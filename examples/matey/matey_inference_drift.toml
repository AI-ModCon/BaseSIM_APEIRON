# MATEY ViT inference + domain-shift drift detection.
#
# Monitors NRMSE while running real MATEY forward passes. Alternates between
# data.path (baseline) and data.alt_path (shift domain) on each stream reload
# to simulate cross-machine / cross-shot distribution shift.
#
# Requires GPU + checkpoint for meaningful metrics. See INTEGRATION_PLAN.md in
# src/notes/BaseSIM_APEIRON/.

seed = 1337
device = "auto"
multi_gpu = false
verbosity = "INFO"

[model]
name = "matey_vit"
pretrained_path = ""

[data]
name = "matey_inference_drift"
# Baseline SOLPS root (training distribution / reference machine).
path = "/path/to/baseline/solps"
# Shift SOLPS root (different machine or shot set). Leave empty to disable toggle.
alt_path = ""

[train]
batch_size = 1
num_workers = 0
init_lr = 0.001
max_iter = 50
grad_accumulation_steps = 1

[continual_learning]
# "none" = inference-only drift demo; "base" = update weights on drift
update_mode = "none"

[drift_detection]
detector_name = "ADWINDetector"
detection_interval = 5
aggregation = "last"
metric_index = 0  # 0=nrmse, 1=rmse, 2=loss
reset_after_learning = false
max_stream_updates = 10

adwin_delta = 0.01
adwin_minor_threshold = 0.3
adwin_moderate_threshold = 0.6

[logging]
backend = "none"
experiment_name = "matey-inference-drift"

[visualization]
baseline = 0.0
input = "output/matey_inference_drift.csv"
output = "output/matey_inference_drift_dashboard.png"
