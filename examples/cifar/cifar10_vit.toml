# cifar10.toml
seed = 1337
device = "auto"
multi_gpu = false
verbosity = "INFO"  # DEBUG, INFO, INFO:0-9, WARNING, ERROR, CRITICAL

[model]
name = "vit16b"  
pretrained_path = "examples/cifar/cifar10_vit.pth"

[data]
name = "cifar10"
path = ""  # folder or file later for custom dataset

[train]
batch_size = 256
grad_accumulation_steps = 4
num_workers = 4
init_lr = 0.001
max_iter = 50

[continual_learning]
update_mode = "base"
jvp_lambda = 10
jvp_deltax_norm = 1

# ewc hyperparameters
ewc_lambda = 1000.0
ewc_ema_decay = 0.95

# kfac hyperparameters
kfac_lambda =1e-2
kfac_ema_decay = 0.95


[drift_detection]
detector_name = "ADWINDetector"
detection_interval = 10  # Check drift every 10 batches
aggregation = "mean"  # Average metric over 10 batches
metric_index = 0  # Monitor loss (0=accuracy, 1=loss)
reset_after_learning = false
max_stream_updates = 20

# ADWIN hyperparameters
adwin_delta = 0.002
adwin_minor_threshold = 0.3
adwin_moderate_threshold = 0.6

[visualization]
baseline = 90.0
input = "output/cifar.csv"
output = "output/cifar10_vit_dashboard.png"