# mnist.min.toml
version = "1"
seed = 1337
device = "auto"
multi_gpu = false

[model]
name = "dummy"  

[data]
name = "mnist"
path = ""  # folder or file later for custom dataset

[train]
batch_size = 64
num_workers = 4
init_lr = 0.001


[continuous_learning]
jvp_reg = 0.001
deltax_norm = 1
max_iter = 300

[visualization]
baseline = 90.0
input = "output/cl_only.csv"
output = "output/mnist_dashboard.png"
